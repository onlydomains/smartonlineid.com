<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* CSS: Styling for all devices */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 120px;
            font-weight: 900;
            color: #2c3e50;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #bdc3c7;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #7f8c8d;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease, background-color 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .home-btn:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            h1 { font-size: 80px; }
            h2 { font-size: 20px; }
            p { font-size: 16px; }
            .home-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>Sorry, the page you are looking for may have been removed or its URL has been changed.</p>
        
        <button onclick="goToHome()" class="home-btn">Go to Home Page</button>
    </div>

    <script>
        // JS: Redirect to current domain root
        function goToHome() {
            // window.location.origin will take you directly to the main domain (e.g., https://example.com)
            window.location.href = window.location.origin;
        }
    </script>

</body>
</html>
